# 로컬 개발 전용 postgres + redis.
# 클러스터 dev DB와 완전히 분리된 로컬 전용 인스턴스 — 이 컨테이너는 라즈베리파이 k3s와 무관하다.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clog
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: clog_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clog"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
