# Alembic 설정 파일
#
# DATABASE_URL 은 여기 직접 안 쓰고, env.py 에서 환경변수로 동적 주입
# → 환경별 (dev/prod) 다른 DB 에 같은 Alembic 으로 마이그레이션 가능

[alembic]
# 마이그레이션 스크립트 위치
script_location = alembic

# 마이그레이션 파일 이름 형식
# 예: 2026_06_09_1234-abc123_add_users_table.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# UTC 사용
timezone = UTC

# 마이그레이션 파일에 import 할 prepend
# (필요 시 사용)
# prepend_sys_path = .

# DB URL 은 env.py 에서 동적 처리하므로 비워둠
sqlalchemy.url =

# 새 마이그레이션 자동 lint 적용 (선택)
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# ─── 로깅 ───
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
