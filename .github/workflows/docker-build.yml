name: Docker Build & Push

# main 브랜치 push 또는 PR 시 빌드
# main 브랜치만 ghcr.io에 push
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}    # miginho12/clog-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # ghcr.io push 권한
      id-token: write   # OIDC (필요시)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # ARM64 크로스 컴파일용 (라즈베리파이 타겟)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        # 멀티 플랫폼 빌드 (amd64 + arm64)
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        # PR에서는 push 안 함 (보안)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        # 태그 자동 생성: latest, main-abc1234, v1.0.0, ...
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
